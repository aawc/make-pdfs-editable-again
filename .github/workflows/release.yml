name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # Required to allow the action to create releases and upload assets

jobs:
  build:
    name: Build and Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Compile for Windows, Linux, and macOS across AMD64 and ARM64 architectures
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # Determine binary extension for Windows
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          
          # Build target binary
          go build -o bin/make-pdfs-editable-again-${{ matrix.goos }}-${{ matrix.goarch }}$EXT cmd/make-pdfs-editable-again/main.go

      - name: Upload Artifacts (Temporary)
        uses: actions/upload-artifact@v4
        with:
          name: make-pdfs-editable-again-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/make-pdfs-editable-again-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        id: tag_generator
        run: |
          yyyy=$(date +%Y)
          mm=$(date +%m)
          nnn=$(printf "%03d" ${{ github.run_number }})
          TAG_NAME="v$yyyy.$mm.$nnn"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: release-binaries/
          merge-multiple: true

      - name: Submit Binaries to VirusTotal
        id: virustotal_scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: release-binaries/*
        continue-on-error: true

      - name: Format VirusTotal Reports
        id: vt_formatter
        run: |
          formatted=""
          for filepath in release-binaries/*; do
            if [ -f "$filepath" ]; then
              filename=$(basename "$filepath")
              sha256=$(sha256sum "$filepath" | cut -d' ' -f1)
              url="https://www.virustotal.com/gui/file/$sha256/detection"
              formatted="$formatted"$'\n'"* **$filename**: [VirusTotal Permanent Analysis Report]($url)"
            fi
          done
          
          # Write multiline output securely
          echo "vt_reports<<EOF" >> $GITHUB_OUTPUT
          echo "$formatted" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog_generator
        run: |
          # Fetch previous tag, default to empty if none exists
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"* %s (%h)" -n 20)
          else
            CHANGELOG=$(git log --oneline --pretty=format:"* %s (%h)" $PREV_TAG..HEAD)
          fi
          
          # Write multiline output securely
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_generator.outputs.tag_name }}
          files: release-binaries/*
          name: Release ${{ steps.tag_generator.outputs.tag_name }}
          draft: false
          prerelease: false
          body: |
            ### Automated Multi-Platform Release
            Compiled executable binaries for Windows, macOS, and Linux AMD64/ARM64 architectures.
            
            #### Security Verification (VirusTotal Scan Reports)
            ${{ steps.vt_formatter.outputs.vt_reports }}
            
            #### Detailed Changelog (Commits since last release)
            ${{ steps.changelog_generator.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
